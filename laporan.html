<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Absensi - MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --sidebar-width: 250px; }
        body { display: flex; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: rgba(15, 23, 42, 0.8); border-right: 1px solid var(--glass-border); padding: 2rem 1rem; display: flex; flex-direction: column; backdrop-filter: blur(16px); }
        .sidebar-brand { font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem; padding: 0 1rem; color: var(--white); display: flex; gap: 10px;}
        .nav-link { display: flex; padding: 0.8rem 1rem; color: var(--gray); text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; transition: var(--transition); }
        .nav-link:hover, .nav-link.active { background: rgba(79, 70, 229, 0.2); color: var(--primary); }
        .mt-auto { margin-top: auto; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 2rem; }
        
        /* Filters */
        .filter-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--gray);
            font-weight: 500;
        }

        .filter-group select, .filter-group input {
            padding: 0.5rem 1rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: var(--white);
            font-family: var(--font-sans);
        }

        /* Report Header (Print only usually, but visible in screen too for completeness) */
        .report-header {
            text-align: center;
            margin-bottom: 2rem;
            display: none; /* Hide onscreen by default unless formatted nicely */
        }
        
        .report-header.show {
            display: block;
        }

        /* Matrix Table */
        .table-container {
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 0.75rem 0.5rem; text-align: center; border-bottom: 1px solid var(--glass-border); border-right: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--white); font-weight: 500; background: rgba(0,0,0,0.2); }
        td { color: var(--white); font-size: 0.9rem; }
        td:first-child, th:first-child { text-align: left; position: sticky; left: 0; background: #1e293b; }
        td:nth-child(2), th:nth-child(2) { text-align: left; position: sticky; left: 50px; background: #1e293b; }
        
        .status-h { color: var(--success); font-weight: bold; }
        .status-a { color: var(--danger); }
        
        /* Highlight low attendance */
        .low-attendance {
            color: var(--danger) !important;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .btn-secondary { background: #475569; color: #fff; }
        .btn-secondary:hover { background: #334155; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-success:hover { background: #059669; }

        .admin-only, .operator-only { display: none; }

        /* Responsive Layout for Mobile */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto !important;
                overflow-x: hidden !important;
            }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
            .sidebar-brand {
                margin-bottom: 1rem;
                justify-content: center;
            }
            nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }
            .nav-link {
                margin-bottom: 0;
                padding: 0.5rem 1rem;
                flex: 1 1 auto;
                text-align: center;
                justify-content: center;
            }
            .main-content {
                height: auto;
                padding: 1rem;
                overflow-y: visible;
                width: 100%;
                max-width: 100vw;
                box-sizing: border-box;
            }
            .filter-container {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                width: 100%;
            }
            .filter-group input, .filter-group select {
                width: 100%;
                box-sizing: border-box;
            }
            .btn-group {
                flex-direction: column;
            }
        }

        /* Print Layout */
        @media print {
            body { background: white; color: black; display: block; overflow: visible; }
            .sidebar, .filter-container, .btn-group { display: none !important; }
            .main-content { padding: 0; }
            .glass-panel, .table-container { background: transparent; border: none; box-shadow: none; }
            table { width: 100%; min-width: auto; border: 1px solid #ccc; }
            th, td { border: 1px solid #ccc; color: black !important; background: transparent !important; }
            td:first-child, th:first-child, td:nth-child(2), th:nth-child(2) { position: static; }
            .report-header { display: block; color: black; }
        }
    </style>
</head>
<body>
    <div class="blob shape-1" style="left: 20%; top: -10%;"></div>

    <aside class="sidebar">
        <div class="sidebar-brand">📊 MVP Absensi</div>
        <nav>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="scan.html" class="nav-link operator-only">Scan QR Code</a>
            <a href="import.html" class="nav-link admin-only">Import Data Siswa</a>
            <a href="laporan.html" class="nav-link active admin-only">Laporan Absensi</a>
            <a href="#" onclick="logout()" class="nav-link mt-auto">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 2rem;" class="no-print">
            <h2>Laporan Absensi</h2>
            <p style="color: var(--gray);">Lihat, cetak, dan ekspor matriks kehadiran.</p>
        </header>

        <div class="filter-container no-print">
            <div class="filter-group">
                <label for="filterKelas">Kelas</label>
                <select id="filterKelas">
                    <option value="ALL">Semua Kelas</option>
                    <!-- Populated by JS -->
                </select>
            </div>
            <div class="filter-group">
                <label for="startDate">Tanggal Mulai</label>
                <input type="date" id="startDate">
            </div>
            <div class="filter-group">
                <label for="endDate">Tanggal Akhir</label>
                <input type="date" id="endDate">
            </div>
            <button class="btn btn-primary" id="btnGenerate">Generate Matrix</button>
        </div>

        <!-- This header is styled specifically for printing based on blueprint -->
        <div class="report-header" id="reportHeader">
            <h2>LAPORAN ABSENSI SISWA</h2>
            <p id="rhKelas">Kelas   : Semua Kelas</p>
            <p id="rhPeriode">Periode : -</p>
        </div>

        <div class="btn-group no-print">
            <button class="btn btn-secondary" id="btnPrint">🖨️ Print Laporan</button>
            <button class="btn btn-success" id="btnExport">📊 Export Excel</button>
        </div>

        <div class="table-container">
            <table id="matrixTable">
                <thead id="matrixHead">
                    <!-- Populated by JS -->
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>%</th>
                    </tr>
                </thead>
                <tbody id="matrixBody">
                    <tr><td colspan="3" style="text-align: center; color: var(--gray);">Silakan klik Generate Matrix untuk melihat data</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = Api.getCurrentUser();
            if (!currentUser || currentUser.role !== 'admin') {
                alert("Akses ditolak! Hanya Admin.");
                window.location.href = 'dashboard.html';
                return;
            }
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
        });

        function logout() {
            Api.clearSession();
            window.location.href = 'login.html';
        }
    </script>
    <script src="js/laporan.js"></script>
</body>
</html>
