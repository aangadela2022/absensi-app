<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR Absensi - MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- HTML5-QRCode -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        :root { --sidebar-width: 250px; }
        body { display: flex; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: rgba(15, 23, 42, 0.8); border-right: 1px solid var(--glass-border); padding: 2rem 1rem; display: flex; flex-direction: column; backdrop-filter: blur(16px); }
        .sidebar-brand { font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem; padding: 0 1rem; color: var(--white); display: flex; gap: 10px;}
        .nav-link { display: flex; padding: 0.8rem 1rem; color: var(--gray); text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; transition: var(--transition); }
        .nav-link:hover, .nav-link.active { background: rgba(79, 70, 229, 0.2); color: var(--primary); }
        .mt-auto { margin-top: auto; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        
        .scanner-container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
            text-align: center;
        }

        #reader {
            width: 100%;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            overflow: hidden;
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }
        
        #reader__dashboard_section_csr button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }

        .result-card {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1rem;
            color: white;
            display: none;
        }
        
        .result-card.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .result-card.already {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .result-card.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-only, .operator-only { display: none; }
    </style>
</head>
<body>
    <div class="blob shape-2" style="right: 10%; bottom: 10%;"></div>

    <aside class="sidebar">
        <div class="sidebar-brand">📊 MVP Absensi</div>
        <nav>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="scan.html" class="nav-link active operator-only">Scan QR Code</a>
            <a href="import.html" class="nav-link admin-only">Import Data Siswa</a>
            <a href="laporan.html" class="nav-link admin-only">Laporan Absensi</a>
            <a href="#" onclick="logout()" class="nav-link mt-auto">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="text-align: center; margin-bottom: 1rem;">
            <h2>Scanner Kehadiran</h2>
            <p style="color: var(--gray);">Arahkan kamera ke QR Code Siswa (format NIS)</p>
        </header>

        <div class="scanner-container">
            <div id="reader"></div>
            
            <div class="result-card" id="scanResult">
                <h3 id="resTitle" style="margin-bottom: 10px;">✔ Berhasil Absen</h3>
                <p>Nama : <span id="resName" style="font-weight: bold;">-</span></p>
                <p>Kelas : <span id="resClass" style="font-weight: bold;">-</span></p>
                <p>Waktu : <span id="resTime">-</span></p>
            </div>
            
            <div class="result-card error" id="errorResult">
                <h3 style="color: #fca5a5; margin-bottom: 10px;">❌ Gagal Absen</h3>
                <p id="errMessage">Siswa tidak ditemukan</p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = Api.getCurrentUser();
            if (!currentUser || currentUser.role !== 'operator') {
                alert("Akses ditolak! Hanya Operator.");
                window.location.href = 'dashboard.html';
                return;
            }
            document.querySelectorAll('.operator-only').forEach(el => el.style.display = 'flex');
        });

        function logout() {
            Api.clearSession();
            window.location.href = 'login.html';
        }
    </script>
    <script src="js/scanner.js"></script>
</body>
</html>
