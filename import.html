<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Data Siswa - MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        /* Reusing sidebar layout logic from dashboard */
        :root { --sidebar-width: 250px; }
        body { display: flex; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: rgba(15, 23, 42, 0.8); border-right: 1px solid var(--glass-border); padding: 2rem 1rem; display: flex; flex-direction: column; backdrop-filter: blur(16px); }
        .sidebar-brand { font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem; padding: 0 1rem; color: var(--white); display: flex; gap: 10px;}
        .nav-link { display: flex; padding: 0.8rem 1rem; color: var(--gray); text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; transition: var(--transition); }
        .nav-link:hover, .nav-link.active { background: rgba(79, 70, 229, 0.2); color: var(--primary); }
        .mt-auto { margin-top: auto; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 2rem; }
        
        .upload-card {
            background: var(--glass-bg);
            border: 1px dashed var(--gray);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            transition: var(--transition);
        }
        
        .upload-card:hover { border-color: var(--primary); }
        
        .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
        
        input[type="file"] { display: none; }
        .upload-label { cursor: pointer; display: inline-block; }
        
        .table-container {
            margin-top: 2rem;
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--glass-border); }
        th { color: var(--gray); font-weight: 500; }
        td { color: var(--white); }
        
        .admin-only, .operator-only { display: none; }

        /* Responsive Layout for Mobile */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto !important;
                overflow-x: hidden !important;
            }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
            .sidebar-brand {
                margin-bottom: 1rem;
                justify-content: center;
            }
            nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }
            .nav-link {
                margin-bottom: 0;
                padding: 0.5rem 1rem;
                flex: 1 1 auto;
                text-align: center;
                justify-content: center;
            }
            .main-content {
                height: auto;
                padding: 1rem;
                overflow-y: visible;
                width: 100%;
                max-width: 100vw;
                box-sizing: border-box;
            }
            .upload-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="blob shape-1" style="left: 20%; top: -10%;"></div>

    <aside class="sidebar">
        <div class="sidebar-brand">📊 MVP Absensi</div>
        <nav>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="scan.html" class="nav-link operator-only">Scan QR Code</a>
            <a href="import.html" class="nav-link active admin-only">Import Data Siswa</a>
            <a href="laporan.html" class="nav-link admin-only">Laporan Absensi</a>
            <a href="#" onclick="logout()" class="nav-link mt-auto">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 2rem;">
            <h2>Import Data Siswa</h2>
            <p style="color: var(--gray);">Format CSV: nis, nama, kelas</p>
        </header>

        <div class="upload-card">
            <div class="upload-icon">📁</div>
            <p style="margin-bottom: 1rem; color: var(--gray);">Pilih file CSV untuk diunggah</p>
            <label for="csvFile" class="btn btn-primary upload-label">Pilih File CSV</label>
            <input type="file" id="csvFile" accept=".csv">
            <div id="uploadStatus" class="alert hidden" style="margin-top: 1rem;"></div>
        </div>

        <div class="table-container hidden" id="previewContainer">
            <h3 style="margin-bottom: 1rem;">Data Siswa Tersimpan (<span id="countSiswa">0</span>)</h3>
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>NIS</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = Api.getCurrentUser();
            if (!currentUser || currentUser.role !== 'admin') {
                alert("Akses ditolak! Hanya Admin.");
                window.location.href = 'dashboard.html';
                return;
            }
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
        });

        function logout() {
            Api.clearSession();
            window.location.href = 'login.html';
        }
    </script>
    <script src="js/import.js"></script>
</body>
</html>
